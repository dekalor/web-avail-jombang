name: Deploy to cPanel (PM2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            echo "🚀 Starting deployment..."

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"
            nvm use 22

            cd /home/availjom/web-avail-jombang

            echo "📥 Pull latest code"
            git pull origin main

            echo "📦 Install dependencies"
            npm install

            echo "🏗️ Build frontend"
            npm run build

            echo "🔄 Restart app"
            pm2 reload web-avail-jombang || pm2 start ecosystem.config.js

            echo "✅ Deployment finished"